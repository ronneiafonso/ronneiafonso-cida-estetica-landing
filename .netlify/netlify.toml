[[headers]]
for = "/*"

[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"
Content-Security-Policy = "default-src 'self';\n      script-src 'self' 'unsafe-inline';\n      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;\n      font-src 'self' https://fonts.gstatic.com;\n      img-src 'self' data: https:;\n      connect-src 'self' https://wa.me https://api.whatsapp.com;\n      frame-ancestors 'none'"

